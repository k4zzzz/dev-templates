# dev-templates/lima/dev.yaml
#
# Lima VM configuration for the dev environment.
# This file is fetched automatically by `dev vm create`.
# Adjust cpus/memory/disk to taste.

# ── VM resources ──────────────────────────────────────────────────────────────
cpus: 4
memory: "8GiB"
disk: "60GiB"

# ── Base image ────────────────────────────────────────────────────────────────
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# ── No host mounts (intentional isolation) ────────────────────────────────────
mounts: []

# ── No port forwarding by default — add entries here as needed ───────────────
portForwards: []
forwardAgent: true

# ── Provisioning (runs once on first boot) ────────────────────────────────────
provision:
  # System-level: install OS packages
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update -q
      apt-get install -y -q \
        git \
        podman \
        podman-compose \
        uidmap \
        fuse-overlayfs \
        slirp4netns

      # Enable lingering so user-level podman services survive logout
      loginctl enable-linger "$SUDO_USER" 2>/dev/null || true

  # User-level: install uv and the dev CLI
  - mode: user
    script: |
      #!/bin/bash
      set -euo pipefail
      GITHUB_PAT="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"

      git clone --depth=1 https://${GITHUB_PAT}@github.com/k4zzzz/sandboxed-dev-tool.git "$HOME/.dev-tool"

      # Install uv
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"

      # Add uv to shell rc so it persists across sessions
      echo '' >> "$HOME/.bashrc"
      echo '# uv (added by dev-tool provisioning)' >> "$HOME/.bashrc"
      echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"

      # Clone and install the dev CLI
      git clone --depth=1 https://github.com/k4zzzz/sandboxed-dev-tool.git "$HOME/.dev-tool"
      uv tool install "$HOME/.dev-tool"

      # Add uv tool bin to PATH
      UV_BIN="$(uv tool bin)"
      echo "export PATH=\"$UV_BIN:\$PATH\"" >> "$HOME/.bashrc"

      echo ""
      echo "  ✓ dev-tool installed inside VM."
      echo "  Run 'dev project new <path> --template <name>' to create a project."
      echo ""
