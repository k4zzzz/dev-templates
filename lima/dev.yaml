# dev-templates/lima/dev.yaml
#
# Lima VM configuration for the dev environment.
# This file is fetched automatically by `dev vm create`.
# Adjust cpus/memory/disk to taste.

# ── VM resources ──────────────────────────────────────────────────────────────
cpus: 4
memory: "16GiB"
disk: "60GiB"

# ── Base image ────────────────────────────────────────────────────────────────
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# ── No host mounts (intentional isolation) ────────────────────────────────────
mounts: []

# ── No port forwarding by default — add entries here as needed ───────────────
portForwards: []
forwardAgent: true

# ── Use Apple Virtualization Framework
vmType: "vz"
rosetta:
  enabled: true
  binfmt: true

# ── Provisioning (runs once on first boot) ────────────────────────────────────
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -q
      apt-get install -y -q \
        git \
        podman \
        podman-compose \
        uidmap \
        fuse-overlayfs \
        slirp4netns \
        gh
      loginctl enable-linger "ubuntu" 2>/dev/null || true

  - mode: user
    script: |
      #!/bin/bash
      set -euo pipefail
      # Install uv
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"
      echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
      UV_BIN="$(uv tool bin)"
      echo "export PATH=\"${UV_BIN}:\$PATH\"" >> "$HOME/.bashrc"
      # Install Rust (non-interactive)
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      # Install proj tool
      curl -sL https://raw.githubusercontent.com/k4zzzz/dev-templates/main/install.sh | bash
      # GUI apps — non-fatal since this is a headless VM
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/mkasberg/ghostty-ubuntu/HEAD/install.sh)" || true
      curl -fsSL https://opencode.ai/install | bash || true
      curl -f https://zed.dev/install.sh | sh || true
